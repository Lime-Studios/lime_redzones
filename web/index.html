<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lime_redzones</title>
  <style>
    @font-face {
      font-family: 'Plus Jakarta Sans';
      src: url('./fonts/PlusJakartaSans-Variable.woff2') format('woff2-variations'),
           url('./fonts/PlusJakartaSans-Variable.woff2') format('woff2');
      font-weight: 200 800;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg:        #0f0f11;
      --surface:   #161618;
      --surface-2: #1d1d21;
      --surface-3: #25252a;
      --border:    rgba(255,255,255,0.06);
      --border-2:  rgba(255,255,255,0.1);
      --text:      #ffffff;
      --text-2:    rgba(255,255,255,0.72);
      --text-3:    rgba(255,255,255,0.5);
      --accent:        #a3e635;
      --accent-strong: #bef264;
      --accent-soft:   rgba(163,230,53,0.12);
      --accent-border: rgba(163,230,53,0.25);
      --accent-text:   #0f0f11;
      --danger:      #f87171;
      --danger-soft: rgba(248,113,113,0.1);
      --radius:    14px;
      --radius-sm: 9px;
      --font: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      background-color: rgba(0,0,0,0) !important;
      overflow: hidden;
    }
    body { pointer-events: none; font-family: var(--font); }
  </style>
  <link rel="stylesheet" href="./bundle.css">
</head>
<body>
  <script src="./bundle.js"></script>
</body>
</html>
